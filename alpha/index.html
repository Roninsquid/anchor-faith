<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anchor Alpha</title>

  <style>
    :root {
      --bg: #07111f;
      --cream: #fff3d6;
      --muted: #c9bfae;
      --gold: #e6bd68;
      --card: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 243, 214, 0.16);
      --shadow: 0 30px 90px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at top, rgba(230, 189, 104, 0.25), transparent 32%),
        radial-gradient(circle at bottom left, rgba(134, 183, 141, 0.14), transparent 30%),
        linear-gradient(145deg, #07111f 0%, #102033 52%, #050911 100%);
      display: flex;
      justify-content: center;
      padding: 28px 18px;
    }

    .sanctuary {
      width: 100%;
      max-width: 760px;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      text-align: center;
    }

    .brand-mark {
      width: 62px;
      height: 62px;
      margin: 0 auto;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: rgba(255, 243, 214, 0.1);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-size: 2rem;
    }

    .eyebrow {
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.76rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.2rem, 12vw, 6.8rem);
      line-height: 0.92;
      letter-spacing: -0.075em;
    }

    .sub {
      max-width: 560px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 3vw, 1.25rem);
      line-height: 1.7;
    }

    .verse {
      max-width: 620px;
      margin: 0 auto;
      color: rgba(255, 243, 214, 0.92);
      font-size: 1.12rem;
      line-height: 1.8;
      font-style: italic;
    }

    .verse span {
      display: block;
      margin-top: 8px;
      color: var(--gold);
      font-style: normal;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .search-card {
      text-align: left;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .search-card label {
      display: block;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid rgba(255, 243, 214, 0.18);
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.2);
      color: var(--cream);
      padding: 18px;
      font: inherit;
      line-height: 1.6;
      outline: none;
    }

    textarea::placeholder {
      color: rgba(201, 191, 174, 0.7);
    }

    button {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 999px;
      padding: 16px 22px;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #f5d991);
      color: #211504;
      box-shadow: 0 18px 42px rgba(230, 189, 104, 0.28);
    }

    .breath {
      color: rgba(255, 243, 214, 0.62);
      font-size: 0.95rem;
    }

    @media (max-width: 560px) {
      .sanctuary {
        justify-content: flex-start;
        padding-top: 38px;
      }

      .search-card {
        border-radius: 26px;
        padding: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="sanctuary">
    <div class="brand-mark">⚓</div>

    <div>
      <p class="eyebrow">Anchor Alpha</p>
      <h1>Peace be with you.</h1>
    </div>

    <p class="sub">
      Take a moment. Breathe. God is with you.
    </p>

    <p class="verse">
      “Come to me, all who labor and are heavy laden, and I will give you rest.”
      <span>Matthew 11:28</span>
    </p>

    <section class="search-card">
      <label for="heartInput">What’s on your heart today?</label>
      <textarea id="heartInput" placeholder="I’m feeling anxious, grieving, overwhelmed, doubtful, or unsure where to begin..."></textarea>
      <button>Find Scripture</button>
    </section>

    <p class="breath">Take a deep breath. God is with you.</p>
  </main>
</body>
</html>
